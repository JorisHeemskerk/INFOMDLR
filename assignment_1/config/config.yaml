# Default environment yaml file
# NOTE: See assignment_1/config/config_validation_template.py for the 
# parameter restrictions.

general:
    num_data_workers: 1 # Number of workers preparing batches.
jobs:
    job0:
        model: "lstm"
        window_size: 20
        stride: 1
        hidden_size: [32]
        num_layers: 2
        optimiser: "adam"
        train_val_split: [.8, .2]
        batch_size: 16
        n_epochs: 200
        learning_rate: .001 # 1e-3
